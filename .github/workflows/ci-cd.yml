name: FanOps Unified CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --no-engine-strict

      - name: Code Quality - Linting Check
        run: npm run lint

      - name: Type Check (TypeScript compiler)
        run: npx tsc --noEmit

      - name: Run Vitest Unit & Integration Tests
        run: npm run test

      - name: Production Build Check
        run: npm run build
